<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetOps AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111827; color: #e5e7eb; }

    .header { height: 60px; background: #0f172a; border-bottom: 1px solid #1f2937; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
    .title { font-weight: 700; font-size: 20px; }
    .title span { color: #22d3ee; }
    .status { color: #94a3b8; font-size: 13px; }

    .toolbar { height: 48px; background: #111827; border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 8px; padding: 0 16px; }
    .btn { padding: 8px 12px; border: 1px solid #334155; background: #1e293b; color: #e5e7eb; border-radius: 6px; cursor: pointer; }
    .btn:hover { border-color: #22d3ee; }

    .layout { height: calc(100vh - 108px); display: grid; grid-template-columns: 260px 1fr 300px; }

    .left { border-right: 1px solid #1f2937; background: #0b1220; padding: 12px; overflow: auto; }
    .left h3 { margin-bottom: 10px; color: #67e8f9; font-size: 14px; }
    .device-item { padding: 10px; border: 1px solid #1f2937; border-radius: 8px; background: #0f172a; margin-bottom: 8px; cursor: pointer; }
    .device-item:hover, .device-item.active { border-color: #22d3ee; }
    .device-name { font-weight: 700; font-size: 14px; }
    .device-ip { color: #94a3b8; font-size: 12px; margin-top: 4px; }

    .center { display: grid; grid-template-rows: 7fr 3fr; min-width: 0; }
    .topology-panel { border-bottom: 1px solid #1f2937; padding: 10px; display: grid; grid-template-rows: auto 1fr auto; gap: 8px; }
    .topology-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .topology-infinite { position: relative; border: 1px solid #164e63; border-radius: 8px; background: radial-gradient(circle at 20% 20%, #0b1220 0%, #05080f 100%); min-height: 420px; overflow: hidden; }
    .topology-world { position: absolute; inset: 0; transform-origin: 0 0; }
    #topology-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    #topology-node-layer { position: absolute; inset: 0; }
    .lane { position: absolute; left: 12px; right: 12px; height: 110px; border: 1px dashed rgba(56, 189, 248, 0.25); border-radius: 8px; background: rgba(15, 23, 42, 0.22); }
    .lane-label { position: absolute; left: 8px; top: 6px; font-size: 11px; color: #67e8f9; letter-spacing: 1px; text-transform: uppercase; }
    .topo-node { position: absolute; width: 150px; min-height: 64px; border: 1px solid #22d3ee; border-radius: 10px; background: rgba(6, 15, 27, 0.9); box-shadow: 0 0 12px rgba(34, 211, 238, 0.35); padding: 8px; cursor: pointer; user-select: none; }
    .topo-node:hover { box-shadow: 0 0 18px rgba(56, 189, 248, 0.6); }
    .topo-node.router { border-color: #60a5fa; box-shadow: 0 0 14px rgba(96, 165, 250, 0.45); border-radius: 999px; }
    .topo-node.firewall { border-color: #fb923c; box-shadow: 0 0 14px rgba(251, 146, 60, 0.4); border-radius: 4px; }
    .topo-node.switch { border-color: #34d399; box-shadow: 0 0 14px rgba(52, 211, 153, 0.4); border-radius: 10px; }
    .topo-head { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
    .node-dot { width: 10px; height: 10px; border-radius: 50%; background:#22d3ee; box-shadow:0 0 8px #22d3ee; }
    .node-icon { width: 16px; height: 16px; flex: 0 0 16px; }
    .node-remark { font-size: 12px; font-weight: 700; color: #d1fafb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .node-ip { font-size: 11px; color: #7dd3fc; }
    .topo-edge { stroke: #22d3ee; stroke-width: 1.8; opacity: 0.9; fill: none; }
    .topo-edge.trunk { stroke: #f59e0b; }
    .topo-edge.access { stroke: #22d3ee; }
    .topo-edge.port-channel-lacp, .topo-edge.port-channel-static { stroke: #a78bfa; }
    .topo-edge.l3-p2p { stroke: #34d399; stroke-dasharray: 5 4; }
    .pc-ring { fill: none; stroke: #a78bfa; stroke-width: 1.6; opacity: 0.95; }
    .edge-label { fill: #cbd5e1; font-size: 11px; }
    .port-label { fill: #7dd3fc; font-size: 10px; }
    .port-label.right { text-anchor: end; }

    .links { border: 1px solid #1f2937; border-radius: 8px; background: #0f172a; padding: 8px; max-height: 120px; overflow: auto; }
    .link-row { font-size: 12px; color: #cbd5e1; padding: 4px 0; border-bottom: 1px solid #1f2937; }    .link-row:last-child { border-bottom: none; }

    .chat-panel { padding: 10px; display: grid; grid-template-rows: 1fr auto; min-height: 0; }
    .messages { border: 1px solid #1f2937; border-radius: 8px; background: #0b1220; padding: 10px; overflow: auto; }
    .msg { margin-bottom: 8px; padding: 8px; border-radius: 6px; font-size: 13px; }
    .msg-user { background: #1d4ed8; color: #fff; text-align: right; }
    .msg-ai { background: #1f2937; }
    .msg-system { background: #334155; color: #cbd5e1; }
    .chat-input { display: flex; gap: 8px; margin-top: 8px; }
    .chat-input input { flex: 1; border: 1px solid #334155; background: #0f172a; color: #e5e7eb; border-radius: 6px; padding: 8px; }

    .right { border-left: 1px solid #1f2937; background: #0b1220; padding: 12px; overflow: auto; }
    .right h3 { color: #67e8f9; font-size: 14px; margin-bottom: 10px; }
    .detail-row { padding: 8px 0; border-bottom: 1px solid #1f2937; }
    .detail-key { color: #94a3b8; font-size: 12px; }
    .detail-val { margin-top: 4px; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.75); align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-box { width: 460px; max-width: 92vw; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 14px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .close { background: transparent; color: #e5e7eb; border: none; font-size: 22px; cursor: pointer; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 12px; }
    .form-group input, .form-group select { width: 100%; border: 1px solid #334155; background: #0b1220; color: #e5e7eb; border-radius: 6px; padding: 8px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">NETOPS <span>AI</span></div>
    <div class="status"><span id="llm-status">LLM: 未配置</span> | <span id="device-count">设备: 0</span></div>
  </div>

  <div class="toolbar">
    <button class="btn" id="btn-add">+ 添加设备</button>
    <button class="btn" id="btn-discover">识别拓扑(LLDP/CDP)</button>
    <button class="btn" id="btn-apply">确认并应用</button>
    <button class="btn" id="btn-llm">LLM 设置</button>
  </div>

  <div class="layout">
    <aside class="left">
      <h3>设备列表</h3>
      <div id="device-list"></div>
    </aside>

    <main class="center">
      <section class="topology-panel">
        <div style="font-size:13px;color:#67e8f9;">拓扑区域（图标节点）</div>
        <div class="topology-actions">
          <select id="link-from"></select>
          <select id="link-to"></select>
          <select id="link-type">
            <option value="access">Access</option>
            <option value="trunk">Trunk</option>
            <option value="port-channel-lacp">端口聚合(LACP)</option>
            <option value="port-channel-static">端口聚合(静态)</option>
            <option value="l3-p2p">三层点到点</option>
          </select>
          <button class="btn" id="btn-add-link">添加连线</button>
          <input id="tpl-name" placeholder="模板名（例如 上海核心网络）" style="width: 240px;">
          <button class="btn" id="btn-save-tpl">保存模板</button>
          <select id="tpl-select"></select>
          <button class="btn" id="btn-load-tpl">应用模板</button>
        </div>
        <div class="topology-infinite" id="topology-infinite">
          <div class="topology-world" id="topology-world">
            <svg id="topology-svg"></svg>
            <div id="topology-node-layer"></div>
          </div>
        </div>
        <div class="links" id="topology-links"></div>
      </section>

      <section class="chat-panel">
        <div class="messages" id="messages">
          <div class="msg msg-system">拓扑在上，对话在下。点击拓扑节点可直接编辑设备。</div>
        </div>
        <div class="chat-input">
          <input id="chat-input" placeholder="输入命令或问题...">
          <button class="btn" id="btn-send">发送</button>
        </div>
      </section>
    </main>

    <aside class="right">
      <h3>设备详情</h3>
      <div id="detail-content"><div class="detail-row"><div class="detail-key">提示</div><div class="detail-val">点击左侧设备或拓扑节点查看详情</div></div></div>
      <div style="margin-top: 10px; display: grid; gap: 8px;">
        <button class="btn" id="btn-test">测试连接</button>
        <button class="btn" id="btn-conn-edit">编辑</button>
        <button class="btn" id="btn-delete">删除设备</button>
      </div>
    </aside>
  </div>

  <div class="modal" id="modal-device">
    <div class="modal-box">
      <div class="modal-head"><strong id="modal-device-title">添加设备</strong><button class="close" onclick="closeModal('modal-device')">×</button></div>
      <div class="form-group"><label>连接方式</label><select id="add-type" onchange="toggleFields()"><option value="ssh">SSH</option><option value="telnet">Telnet</option><option value="serial">串口</option></select></div>
      <div class="form-group"><label>设备类型</label><select id="add-device-type"><option value="layer2_switch">二层交换机</option><option value="layer3_switch">三层交换机</option><option value="router">路由器</option><option value="firewall">防火墙</option><option value="unknown" selected>自动识别</option></select></div>
      <div id="net-fields">
        <div class="form-group"><label>IP</label><input id="add-ip" placeholder="192.168.1.1"></div>
        <div class="form-group"><label>端口</label><input id="add-port" value="22"></div>
      </div>
      <div id="serial-fields" style="display:none;">
        <div class="form-group"><label>串口</label><input id="add-serial" placeholder="COM3"></div>
        <div class="form-group"><label>波特率</label><select id="add-baud"><option value="9600">9600</option><option value="115200" selected>115200</option></select></div>
      </div>
      <div class="form-group"><label>备注</label><input id="add-remark" placeholder="例如：上海核心"></div>
      <div class="form-group"><label>用户名</label><input id="add-user" placeholder="admin"></div>
      <div class="form-group"><label>密码</label><input id="add-pass" type="password"></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal('modal-device')">取消</button><button class="btn" id="btn-save-device">保存</button></div>
    </div>
  </div>

  <div class="modal" id="modal-conn">
    <div class="modal-box">
      <div class="modal-head"><strong>连接方式编辑</strong><button class="close" onclick="closeModal('modal-conn')">×</button></div>
      <div class="form-group"><label>连接方式</label><select id="conn-type" onchange="toggleConnFields()"><option value="ssh">SSH</option><option value="telnet">Telnet</option><option value="serial">串口</option></select></div>
      <div id="conn-net-fields">
        <div class="form-group"><label>IP</label><input id="conn-ip" placeholder="192.168.1.1"></div>
        <div class="form-group"><label>端口</label><input id="conn-port" value="22"></div>
      </div>
      <div id="conn-serial-fields" style="display:none;">
        <div class="form-group"><label>串口</label><input id="conn-serial" placeholder="COM3"></div>
        <div class="form-group"><label>波特率</label><select id="conn-baud"><option value="9600">9600</option><option value="115200" selected>115200</option></select></div>
      </div>
      <div class="form-group"><label>用户名</label><input id="conn-user" placeholder="admin"></div>
      <div class="form-group"><label>密码</label><input id="conn-pass" type="password"></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal('modal-conn')">取消</button><button class="btn" id="btn-save-conn">保存连接方式</button></div>
    </div>
  </div>

  <div class="modal" id="modal-llm">
    <div class="modal-box">
      <div class="modal-head"><strong>LLM 配置</strong><button class="close" onclick="closeModal('modal-llm')">×</button></div>
      <div class="form-group"><label>Endpoint</label><input id="llm-endpoint" placeholder="http://127.0.0.1:1234/v1"></div>
      <div class="form-group"><label>API Key（可选）</label><input id="llm-key"></div>
      <div class="form-group"><label>模型</label><select id="llm-model"><option value="">-- 获取 --</option></select></div>
      <div class="modal-actions"><button class="btn" id="btn-get-models">获取模型</button><button class="btn" id="btn-save-llm">保存</button></div>
    </div>
  </div>

  <script>
    let devices = [];
    let selectedId = null;
    let editingDeviceId = null;
    let editingBasicOnly = false;
    let topologyState = { nodes: [], links: [], version: 1 };
    let view = { x: 0, y: 0, scale: 1 };
    let dragNodeId = null;
    let dragStart = null;
    let panning = false;

    document.addEventListener('DOMContentLoaded', async () => {
      bindEvents();
      await loadDevices();
      await loadTopologyState();
      await loadTopologyTemplates();
      await loadLLM();
      buildTopologyFromDevices();
      renderAll();
    });

    function bindEvents() {
      document.getElementById('btn-add').onclick = openAddDevice;
      document.getElementById('btn-save-device').onclick = saveDevice;
      document.getElementById('btn-delete').onclick = deleteDevice;
      document.getElementById('btn-test').onclick = testConnect;
      document.getElementById('btn-conn-edit').onclick = openConnEditor;
      document.getElementById('btn-save-conn').onclick = saveConnConfig;
      document.getElementById('btn-send').onclick = sendChat;
      document.getElementById('chat-input').onkeydown = e => { if (e.key === 'Enter') sendChat(); };

      document.getElementById('btn-llm').onclick = () => openModal('modal-llm');
      document.getElementById('btn-get-models').onclick = getModels;
      document.getElementById('btn-save-llm').onclick = saveLLM;

      document.getElementById('btn-add-link').onclick = addTopologyLink;
      document.getElementById('btn-save-tpl').onclick = saveTopologyTemplate;
      document.getElementById('btn-load-tpl').onclick = loadTopologyTemplate;
      document.getElementById('btn-discover').onclick = discoverTopology;
      document.getElementById('btn-apply').onclick = applyTopology;
      initTopologyInteractions();
    }

    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    function addMsg(type, text) {
      const box = document.getElementById('messages');
      const cls = type === 'user' ? 'msg-user' : (type === 'system' ? 'msg-system' : 'msg-ai');
      box.innerHTML += `<div class="msg ${cls}">${text}</div>`;
      box.scrollTop = box.scrollHeight;
    }

    function toggleFields() {
      const t = document.getElementById('add-type').value;
      document.getElementById('net-fields').style.display = t === 'serial' ? 'none' : 'block';
      document.getElementById('serial-fields').style.display = t === 'serial' ? 'block' : 'none';
      if (t === 'ssh') document.getElementById('add-port').value = '22';
      if (t === 'telnet') document.getElementById('add-port').value = '23';
    }

    function toggleConnFields() {
      const t = document.getElementById('conn-type').value;
      document.getElementById('conn-net-fields').style.display = t === 'serial' ? 'none' : 'block';
      document.getElementById('conn-serial-fields').style.display = t === 'serial' ? 'block' : 'none';
      if (t === 'ssh') document.getElementById('conn-port').value = '22';
      if (t === 'telnet') document.getElementById('conn-port').value = '23';
    }

    function openAddDevice() {
      editingDeviceId = null;
      editingBasicOnly = false;
      document.getElementById('modal-device-title').textContent = '添加设备';
      document.getElementById('add-type').value = 'ssh';
      document.getElementById('add-device-type').value = 'unknown';
      document.getElementById('add-ip').value = '';
      document.getElementById('add-port').value = '22';
      document.getElementById('add-serial').value = '';
      document.getElementById('add-baud').value = '115200';
      document.getElementById('add-remark').value = '';
      document.getElementById('add-user').value = '';
      document.getElementById('add-pass').value = '';
      document.getElementById('add-type').closest('.form-group').style.display = 'block';
      document.getElementById('add-user').closest('.form-group').style.display = 'block';
      document.getElementById('add-pass').closest('.form-group').style.display = 'block';
      toggleFields();
      openModal('modal-device');
    }

    function openDeviceEditor(id) {
      const d = devices.find(x => x.id === id);
      if (!d) return;
      editingDeviceId = id;
      editingBasicOnly = true;
      document.getElementById('modal-device-title').textContent = '编辑设备基础信息（LLM）';
      document.getElementById('add-type').value = d.conn_type || 'ssh';
      toggleFields();
      if (d.conn_type === 'serial') {
        document.getElementById('add-serial').value = d.serial_port || '';
        document.getElementById('add-baud').value = String(d.baud || 115200);
      } else {
        document.getElementById('add-ip').value = d.ip || '';
        document.getElementById('add-port').value = String(d.port || 22);
      }
      document.getElementById('add-device-type').value = d.device_type || 'unknown';
      document.getElementById('add-remark').value = d.remark || '';
      document.getElementById('add-user').value = d.username || '';
      document.getElementById('add-pass').value = d.password || '';

      // 拓扑编辑仅改基础信息，不改连接方式
      document.getElementById('add-type').closest('.form-group').style.display = 'none';
      document.getElementById('net-fields').style.display = 'none';
      document.getElementById('serial-fields').style.display = 'none';
      document.getElementById('add-user').closest('.form-group').style.display = 'none';
      document.getElementById('add-pass').closest('.form-group').style.display = 'none';

      openModal('modal-device');
    }

    function openConnEditor() {
      const d = devices.find(x => x.id === selectedId);
      if (!d) { alert('请先选中设备'); return; }
      document.getElementById('conn-type').value = d.conn_type || 'ssh';
      document.getElementById('conn-ip').value = d.ip || '';
      document.getElementById('conn-port').value = String(d.port || (d.conn_type === 'telnet' ? 23 : 22));
      document.getElementById('conn-serial').value = d.serial_port || '';
      document.getElementById('conn-baud').value = String(d.baud || 115200);
      document.getElementById('conn-user').value = d.username || '';
      document.getElementById('conn-pass').value = d.password || '';
      toggleConnFields();
      openModal('modal-conn');
    }

    async function saveConnConfig() {
      const d = devices.find(x => x.id === selectedId);
      if (!d) { alert('请先选中设备'); return; }
      const connType = document.getElementById('conn-type').value;
      const payload = {
        device_id: d.id,
        conn_type: connType,
        device_type: d.device_type || 'unknown',
        remark: d.remark || '',
        username: document.getElementById('conn-user').value.trim(),
        password: document.getElementById('conn-pass').value,
      };
      if (connType === 'serial') {
        payload.serial_port = document.getElementById('conn-serial').value.trim();
        payload.baud = parseInt(document.getElementById('conn-baud').value || '115200');
        if (!payload.serial_port) { alert('请输入串口'); return; }
      } else {
        payload.ip = document.getElementById('conn-ip').value.trim();
        payload.port = parseInt(document.getElementById('conn-port').value || (connType === 'telnet' ? '23' : '22'));
        if (!payload.ip) { alert('请输入 IP'); return; }
      }

      const r = await fetch('/api/device/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const res = await r.json();
      if (!res.success) { alert(res.message || '保存失败'); return; }
      closeModal('modal-conn');
      await loadDevices();
      buildTopologyFromDevices();
      await syncTopologyState();
      renderAll();
      addMsg('system', '连接方式已更新');
    }

    async function loadDevices() {
      const r = await fetch('/api/devices');
      const d = await r.json();
      devices = d.devices || [];
    }

    async function loadTopologyState() {
      try {
        const r = await fetch('/api/topology/state');
        const d = await r.json();
        topologyState = d.state || { nodes: [], links: [], version: 1 };
      } catch {
        topologyState = { nodes: [], links: [], version: 1 };
      }
    }

    async function syncTopologyState() {
      await fetch('/api/topology/state', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(topologyState)
      });
    }

    function buildTopologyFromDevices() {
      topologyState.nodes = devices.map(d => ({
        id: d.id,
        name: d.name,
        remark: d.remark || '',
        ip: d.ip || d.serial_port || 'N/A',
        deviceType: d.device_type || 'unknown'
      }));
    }

    function iconSvg(dtype) {
      const t = (dtype || '').toLowerCase();
      if (t.includes('router')) {
        return `<svg class="node-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#60a5fa" stroke-width="2"/><path d="M7 12h10M12 7v10" stroke="#60a5fa" stroke-width="2"/></svg>`;
      }
      if (t.includes('firewall')) {
        return `<svg class="node-icon" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="#fb923c" stroke-width="2"/><path d="M4 10h16M4 14h16M10 4v16M14 4v16" stroke="#fb923c" stroke-width="1.5"/></svg>`;
      }
      return `<svg class="node-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" stroke="#34d399" stroke-width="2"/><circle cx="8" cy="12" r="1.5" fill="#34d399"/><circle cx="12" cy="12" r="1.5" fill="#34d399"/><circle cx="16" cy="12" r="1.5" fill="#34d399"/></svg>`;
    }

    function initTopologyInteractions() {
      const infinite = document.getElementById('topology-infinite');
      const nodeLayer = document.getElementById('topology-node-layer');

      infinite.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        view.scale = Math.min(2.2, Math.max(0.4, view.scale + delta));
        renderTopology();
      }, { passive: false });

      infinite.addEventListener('mousedown', (e) => {
        const node = e.target.closest('.topo-node');
        if (node) {
          dragNodeId = node.dataset.id;
          dragStart = { x: e.clientX, y: e.clientY };
          e.preventDefault();
          return;
        }
        panning = true;
        dragStart = { x: e.clientX, y: e.clientY };
      });

      window.addEventListener('mousemove', (e) => {
        if (dragNodeId) {
          const n = (topologyState.nodes || []).find(x => x.id === dragNodeId);
          if (!n || !dragStart) return;
          n.x += (e.clientX - dragStart.x) / view.scale;
          n.y += (e.clientY - dragStart.y) / view.scale;
          dragStart = { x: e.clientX, y: e.clientY };
          renderTopology();
          return;
        }
        if (panning && dragStart) {
          view.x += (e.clientX - dragStart.x);
          view.y += (e.clientY - dragStart.y);
          dragStart = { x: e.clientX, y: e.clientY };
          renderTopology();
        }
      });

      window.addEventListener('mouseup', async () => {
        if (dragNodeId || panning) {
          dragNodeId = null;
          panning = false;
          dragStart = null;
          await syncTopologyState();
        }
      });
    }

    function renderAll() {
      renderDeviceList();
      renderTopology();
      renderDetail(selectedId);
      document.getElementById('device-count').textContent = '设备: ' + devices.length;
    }

    function renderDeviceList() {
      const list = document.getElementById('device-list');
      if (!devices.length) {
        list.innerHTML = '<div style="color:#94a3b8;font-size:12px;">暂无设备</div>';
        return;
      }
      list.innerHTML = devices.map(d => `
        <div class="device-item ${selectedId === d.id ? 'active' : ''}" onclick="selectDevice('${d.id}')">
          <div class="device-name">${d.remark || d.name}</div>
          <div class="device-ip">${d.ip || d.serial_port || 'N/A'}</div>
        </div>
      `).join('');
    }

    function renderTopology() {
      const nodeLayer = document.getElementById('topology-node-layer');
      const svg = document.getElementById('topology-svg');
      const world = document.getElementById('topology-world');
      const linksBox = document.getElementById('topology-links');
      const from = document.getElementById('link-from');
      const to = document.getElementById('link-to');

      const nodes = topologyState.nodes || [];
      const links = topologyState.links || [];

      from.innerHTML = '<option value="">来源设备</option>' + nodes.map(n => `<option value="${n.id}">${n.remark || n.name} (${n.ip})</option>`).join('');
      to.innerHTML = '<option value="">目标设备</option>' + nodes.map(n => `<option value="${n.id}">${n.remark || n.name} (${n.ip})</option>`).join('');

      const laneY = { core: 40, aggregation: 170, access: 300 };
      function laneOf(node) {
        const t = (node.deviceType || '').toLowerCase();
        if (t.includes('router') || t.includes('firewall') || t.includes('layer3')) return 'core';
        if (t.includes('aggregation')) return 'aggregation';
        return 'access';
      }

      const laneCount = { core: 0, aggregation: 0, access: 0 };
      nodes.forEach((n) => {
        const lane = laneOf(n);
        if (typeof n.x !== 'number' || typeof n.y !== 'number') {
          laneCount[lane] += 1;
          n.x = 90 + (laneCount[lane] - 1) * 180;
          n.y = laneY[lane];
        }
      });

      world.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;

      if (!nodes.length) {
        nodeLayer.innerHTML = '<div style="color:#94a3b8;position:absolute;left:20px;top:20px;">暂无设备，请先添加设备。</div>';
        svg.innerHTML = '';
      } else {
        nodeLayer.innerHTML = `
          <div class="lane" style="top:${laneY.core - 16}px;"><div class="lane-label">CORE</div></div>
          <div class="lane" style="top:${laneY.aggregation - 16}px;"><div class="lane-label">AGGREGATION</div></div>
          <div class="lane" style="top:${laneY.access - 16}px;"><div class="lane-label">ACCESS</div></div>
        ` + nodes.map(n => {
          const t = (n.deviceType || '').toLowerCase();
          const cls = t.includes('router') ? 'router' : (t.includes('firewall') ? 'firewall' : 'switch');
          return `
          <div class="topo-node ${cls}" data-id="${n.id}" style="left:${n.x}px; top:${n.y}px;" onclick="openDeviceEditor('${n.id}')">
            <div class="topo-head">${iconSvg(t)}<div class="node-remark">${n.remark || n.name || '未命名设备'}</div></div>
            <div class="node-ip">${n.ip || 'N/A'}</div>
          </div>
        `;
        }).join('');

        svg.innerHTML = links.map((l, idx) => {
          const a = nodes.find(n => n.id === l.from);
          const b = nodes.find(n => n.id === l.to);
          if (!a || !b) return '';

          const pairKey = [l.from, l.to].sort().join('::');
          const siblings = links.filter(x => [x.from, x.to].sort().join('::') === pairKey);
          const order = siblings.findIndex(x => x.id === l.id || x === l);
          const offset = (order - (siblings.length - 1) / 2) * 12;

          const x1 = a.x + 150, y1 = a.y + 32 + offset;
          const x2 = b.x, y2 = b.y + 32 + offset;
          const mid = (x1 + x2) / 2;
          const cls = `topo-edge ${l.link_type || 'access'}`;
          const path = `M ${x1} ${y1} L ${mid} ${y1} L ${mid} ${y2} L ${x2} ${y2}`;
          const typeLabel = (!l.link_type || l.link_type === 'unknown') ? '' : l.link_type;
          const shortPort = (p) => {
            const s = (p || '?').trim();
            return s
              .replace(/^GigabitEthernet/i, 'GE')
              .replace(/^Ten-GigabitEthernet/i, '10GE')
              .replace(/^FortyGigE/i, '40GE')
              .replace(/^HundredGigE/i, '100GE')
              .replace(/^Ethernet/i, 'Eth');
          };
          const leftPort = shortPort(l.from_port);
          const rightPort = shortPort(l.to_port);
          const isPortChannel = (l.link_type || '').startsWith('port-channel');
          const cy = (y1 + y2) / 2;
          return `<path class="${cls}" d="${path}" />
                  ${isPortChannel ? `<circle class="pc-ring" cx="${mid}" cy="${cy}" r="9"></circle><circle class="pc-ring" cx="${mid}" cy="${cy}" r="5"></circle>` : ''}
                  ${typeLabel ? `<text class="edge-label" x="${mid + 12}" y="${cy - 10}">${typeLabel}</text>` : ''}
                  <text class="port-label" x="${x1 + 8}" y="${y1 - 6}">${leftPort}</text>
                  <text class="port-label right" x="${x2 - 8}" y="${y2 - 6}">${rightPort}</text>`;
        }).join('');
      }

      if (!links.length) {
        linksBox.innerHTML = '<div style="color:#94a3b8;font-size:12px;">暂无连线</div>';
      } else {
        linksBox.innerHTML = links.map(l => `<div class="link-row">${l.from_name || l.from} → ${l.to_name || l.to} ｜ ${(l.link_type && l.link_type !== 'unknown') ? l.link_type : '自动识别'} ｜ ${l.from_port || '?'} ↔ ${l.to_port || '?'}</div>`).join('');
      }
    }

    function selectDevice(id) {
      selectedId = id;
      renderAll();
    }

    function renderDetail(id) {
      const box = document.getElementById('detail-content');
      const d = devices.find(x => x.id === id);
      if (!d) {
        box.innerHTML = '<div class="detail-row"><div class="detail-key">提示</div><div class="detail-val">点击设备查看详情</div></div>';
        return;
      }
      box.innerHTML = `
        <div class="detail-row"><div class="detail-key">备注</div><div class="detail-val">${d.remark || '无'}</div></div>
        <div class="detail-row"><div class="detail-key">名称</div><div class="detail-val">${d.name || '无'}</div></div>
        <div class="detail-row"><div class="detail-key">连接</div><div class="detail-val">${d.conn_type === 'serial' ? (d.serial_port || '') : ((d.ip || '') + ':' + (d.port || ''))}</div></div>
        <div class="detail-row"><div class="detail-key">类型</div><div class="detail-val">${d.device_type || 'unknown'}</div></div>
        <div class="detail-row"><div class="detail-key">厂商</div><div class="detail-val">${d.vendor || 'unknown'}</div></div>
      `;
    }

    async function saveDevice() {
      const current = devices.find(x => x.id === editingDeviceId);
      const type = editingBasicOnly && current ? (current.conn_type || 'ssh') : document.getElementById('add-type').value;
      const payload = {
        conn_type: type,
        device_type: document.getElementById('add-device-type').value,
        remark: document.getElementById('add-remark').value.trim(),
        username: editingBasicOnly && current ? (current.username || '') : document.getElementById('add-user').value.trim(),
        password: editingBasicOnly && current ? (current.password || '') : document.getElementById('add-pass').value
      };
      if (editingBasicOnly && editingDeviceId) {
        payload.device_id = editingDeviceId;
        payload.basic_only = true;
      }

      if (type === 'serial') {
        payload.serial_port = editingBasicOnly && current ? (current.serial_port || '') : document.getElementById('add-serial').value.trim();
        payload.baud = editingBasicOnly && current ? parseInt(current.baud || 115200) : parseInt(document.getElementById('add-baud').value || '115200');
      } else {
        payload.ip = editingBasicOnly && current ? (current.ip || '') : document.getElementById('add-ip').value.trim();
        payload.port = editingBasicOnly && current ? parseInt(current.port || (type === 'telnet' ? 23 : 22)) : parseInt(document.getElementById('add-port').value || (type === 'telnet' ? '23' : '22'));
        if (!payload.ip) { alert('请输入 IP'); return; }
      }

      const r = await fetch('/api/device/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const d = await r.json();
      if (!d.success) { alert(d.message || '保存失败'); return; }

      closeModal('modal-device');
      await loadDevices();
      buildTopologyFromDevices();
      await syncTopologyState();
      renderAll();
      addMsg('system', editingDeviceId ? '设备已更新' : '设备已保存');
      editingDeviceId = null;
      editingBasicOnly = false;
    }

    async function deleteDevice() {
      if (!selectedId) { alert('请先选中设备'); return; }
      if (!confirm('确定删除该设备吗？')) return;
      const r = await fetch('/api/device/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ device_id: selectedId })
      });
      const d = await r.json();
      if (!d.success) { alert(d.message || '删除失败'); return; }
      selectedId = null;
      await loadDevices();
      buildTopologyFromDevices();
      await syncTopologyState();
      renderAll();
      addMsg('system', '设备已删除');
    }

    async function testConnect() {
      const d = devices.find(x => x.id === selectedId);
      if (!d) { alert('请先选中设备'); return; }
      addMsg('user', `测试连接 ${d.remark || d.name}`);
      addMsg('system', '测试连接功能保留在下一版完善');
    }

    async function addTopologyLink() {
      const fromId = document.getElementById('link-from').value;
      const toId = document.getElementById('link-to').value;
      const linkType = document.getElementById('link-type').value;
      if (!fromId || !toId || fromId === toId) { alert('请选择两个不同设备'); return; }
      const from = topologyState.nodes.find(n => n.id === fromId);
      const to = topologyState.nodes.find(n => n.id === toId);
      if (!from || !to) return;

      topologyState.links.push({
        id: 'link_' + Date.now(),
        from: fromId,
        to: toId,
        from_name: from.remark || from.name,
        to_name: to.remark || to.name,
        link_type: linkType
      });
      await syncTopologyState();
      renderTopology();
      addMsg('system', `已添加连线: ${from.remark || from.name} -> ${to.remark || to.name} (${linkType})`);
    }

    async function loadTopologyTemplates() {
      const r = await fetch('/api/topology/template/list');
      const d = await r.json();
      const s = document.getElementById('tpl-select');
      const items = d.templates || [];
      s.innerHTML = '<option value="">选择模板</option>' + items.map(x => `<option value="${x.name}">${x.name}</option>`).join('');
    }

    async function saveTopologyTemplate() {
      const name = document.getElementById('tpl-name').value.trim();
      if (!name) { alert('请输入模板名'); return; }
      const r = await fetch('/api/topology/template/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, state: topologyState })
      });
      const d = await r.json();
      if (!d.success) { alert(d.message || '保存模板失败'); return; }
      await loadTopologyTemplates();
      addMsg('system', `模板已保存: ${name}`);
    }

    async function loadTopologyTemplate() {
      const name = document.getElementById('tpl-select').value;
      if (!name) { alert('请先选择模板'); return; }
      const r = await fetch('/api/topology/template/load', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const d = await r.json();
      if (!d.success) { alert(d.message || '加载模板失败'); return; }
      topologyState = d.state || { nodes: [], links: [], version: 1 };
      renderTopology();
      addMsg('system', `已应用模板: ${name}`);
    }

    async function discoverTopology() {
      const r = await fetch('/api/topology/discover', { method: 'POST' });
      const d = await r.json();
      if (!d.success) { alert(d.message || '识别失败'); return; }
      topologyState = d.state || topologyState;
      renderTopology();
      addMsg('system', `拓扑识别完成，发现 ${d.discovered_links || 0} 条连线`);
    }

    async function applyTopology() {
      const r = await fetch('/api/topology/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: topologyState })
      });
      const d = await r.json();
      if (!d.success) { alert(d.message || '应用失败'); return; }
      const ok = (d.results || []).filter(x => x.result && x.result.success).length;
      const total = (d.results || []).length;
      addMsg('system', `拓扑应用完成：${ok}/${total} 成功`);
    }

    async function loadLLM() {
      try {
        const r = await fetch('/api/llm/config');
        const d = await r.json();
        if (d.endpoint) {
          document.getElementById('llm-endpoint').value = d.endpoint;
          document.getElementById('llm-key').value = d.api_key || '';
          if (d.model) document.getElementById('llm-model').innerHTML = `<option value="${d.model}">${d.model}</option>`;
          document.getElementById('llm-status').textContent = 'LLM: ' + (d.model || '已配置');
        }
      } catch {}
    }

    async function getModels() {
      const endpoint = document.getElementById('llm-endpoint').value.trim();
      const api_key = document.getElementById('llm-key').value.trim();
      if (!endpoint) { alert('请输入 Endpoint'); return; }
      const r = await fetch('/api/llm/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ endpoint, api_key })
      });
      const d = await r.json();
      if (!d.success || !(d.models || []).length) { alert(d.message || '获取失败'); return; }
      document.getElementById('llm-model').innerHTML = d.models.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    async function saveLLM() {
      const payload = {
        provider: 'openai',
        endpoint: document.getElementById('llm-endpoint').value.trim(),
        api_key: document.getElementById('llm-key').value.trim(),
        model: document.getElementById('llm-model').value
      };
      if (!payload.endpoint) { alert('请输入 Endpoint'); return; }
      const r = await fetch('/api/llm/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const d = await r.json();
      if (!d.success) { alert(d.message || '保存失败'); return; }
      closeModal('modal-llm');
      document.getElementById('llm-status').textContent = 'LLM: ' + (payload.model || '已配置');
      addMsg('system', 'LLM 配置已保存');
    }

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg) return;
      addMsg('user', msg);
      input.value = '';
      const d = devices.find(x => x.id === selectedId);
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, context: { selected_device: d?.name || d?.remark } })
      });
      const res = await r.json();
      addMsg('ai', (res.executed ? '✅ ' : '') + (res.response || '无响应'));
    }
  </script>
</body>
</html>
