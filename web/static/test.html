<!DOCTYPE html>
<html>
<head>
    <title>Test NetOps Buttons</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #0f0; 
            font-family: Consolas, monospace; 
            padding: 20px;
        }
        h1 { color: #0f0; margin-bottom: 20px; }
        .btn { 
            background: #000; 
            color: #0f0; 
            border: 1px solid #0f0; 
            padding: 10px 20px; 
            cursor: pointer; 
            margin: 10px;
            font-size: 14px;
        }
        .btn:hover { 
            background: #0f0; 
            color: #000; 
        }
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.9); 
            z-index: 9999;
            align-items: center; 
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: #111; 
            border: 2px solid #0f0; 
            padding: 30px; 
            width: 400px;
            color: #0f0;
        }
        .modal h2 { margin-bottom: 15px; }
        .modal p { margin-bottom: 15px; color: #080; }
    </style>
</head>
<body>
    <h1>NetOps Button Test</h1>
    <button class="btn" id="btn1">添加设备</button>
    <button class="btn" id="btn2">模型设置</button>
    <button class="btn" id="btn3">AI对话</button>

    <div class="modal" id="modal1">
        <div class="modal-content">
            <h2>添加设备</h2>
            <p>这是添加设备对话框</p>
            <button class="btn" onclick="document.getElementById('modal1').classList.remove('active')">关闭</button>
        </div>
    </div>

    <div class="modal" id="modal2">
        <div class="modal-content">
            <h2>模型设置</h2>
            <p>这是模型设置对话框</p>
            <button class="btn" onclick="document.getElementById('modal2').classList.remove('active')">关闭</button>
        </div>
    </div>

    <script>
        document.getElementById('btn1').addEventListener('click', function() {
            console.log('btn1 clicked');
            document.getElementById('modal1').classList.add('active');
        });
        document.getElementById('btn2').addEventListener('click', function() {
            console.log('btn2 clicked');
            document.getElementById('modal2').classList.add('active');
        });
        document.getElementById('btn3').addEventListener('click', function() {
            console.log('AI对话按钮被点击');
            alert('AI对话按钮工作正常!');
        });
    </script>
</body>
</html>
